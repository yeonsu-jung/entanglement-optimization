<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rod Packing Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* ── Info panel (top-left) ── */
    #info {
      position: fixed;
      top: 18px;
      left: 18px;
      background: rgba(13, 17, 23, 0.75);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px 16px;
      line-height: 1.8;
      backdrop-filter: blur(6px);
      pointer-events: none;
      min-width: 160px;
    }
    #info-title {
      font-size: 15px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 4px;
      letter-spacing: 0.03em;
    }
    .info-row { display: flex; justify-content: space-between; gap: 16px; }
    .info-label { color: #8b949e; }
    .info-val   { color: #79c0ff; font-weight: 600; }

    /* ── Status overlay ── */
    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(13, 17, 23, 0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 18px 28px;
      font-size: 14px;
      color: #e6edf3;
      backdrop-filter: blur(8px);
      pointer-events: none;
      transition: opacity 0.4s;
    }
    #status.hidden { opacity: 0; pointer-events: none; }

    /* ── Step bar (above scrubber) ── */
    #step-bar {
      display: flex;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .step-seg {
      height: 100%;
      transition: opacity 0.2s;
      opacity: 0.45;
    }
    .step-seg.active { opacity: 1; }

    /* ── Bottom controls ── */
    #controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 20px 18px;
      background: linear-gradient(to top, rgba(13,17,23,0.92) 0%, transparent 100%);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #scrubber-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #58a6ff;
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    #btn-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #e6edf3;
      font-size: 16px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    button:hover { background: rgba(255,255,255,0.14); }
    button:active { background: rgba(88,166,255,0.25); }

    #speed-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #8b949e;
      font-size: 12px;
      margin-left: auto;
    }
    #speed-row input[type=range] { width: 80px; flex: none; }
    #speed-label { min-width: 46px; color: #79c0ff; }

    #step-labels {
      display: flex;
      width: 100%;
      font-size: 10px;
      color: #8b949e;
      margin-bottom: 2px;
    }
    .step-label {
      overflow: hidden;
      text-align: center;
      white-space: nowrap;
    }
  </style>

<body>

<canvas id="canvas"></canvas>

<div id="info">
  <div id="info-title">Rod Packing</div>
  <div class="info-row"><span class="info-label">N rods</span>  <span class="info-val" id="iv-n">—</span></div>
  <div class="info-row"><span class="info-label">phase</span>   <span class="info-val" id="iv-ar">—</span></div>
  <div class="info-row"><span class="info-label">radius</span>  <span class="info-val" id="iv-r">—</span></div>
  <div class="info-row"><span class="info-label">step</span>    <span class="info-val" id="iv-step">—</span></div>
  <div class="info-row"><span class="info-label">frame</span>   <span class="info-val" id="iv-frame">—</span></div>
</div>

<div id="status">Loading…</div>

<div id="controls">
  <div id="step-labels"></div>
  <div id="step-bar"></div>

  <div id="scrubber-row">
    <input type="range" id="scrubber" min="0" max="100" value="0" step="1" />
  </div>

  <div id="btn-row">
    <button id="btn-prev" title="Previous AR step">⏮</button>
    <button id="btn-play" title="Play / Pause">⏸</button>
    <button id="btn-next" title="Next AR step">⏭</button>
    <div id="speed-row">
      <span>speed</span>
      <input type="range" id="speed" min="1" max="120" value="30" step="1" />
      <span id="speed-label">30 fps</span>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ──────────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

// ── Scene ─────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);

// ── Camera ────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.001, 200);
camera.position.set(1.6, 1.0, 2.2);
camera.lookAt(0, 0, 0);

// ── Controls ──────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, canvas);
controls.enableDamping  = true;
controls.dampingFactor  = 0.06;
controls.autoRotate     = false;
controls.autoRotateSpeed = 0.4;

// ── Lighting ──────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.55));

const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(3, 5, 4);
scene.add(sun);

const fill = new THREE.DirectionalLight(0x88aaff, 0.35);
fill.position.set(-3, -2, -3);
scene.add(fill);

// ── Reference box ─────────────────────────────────────────────────────────
const boxEdges = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 1, 1)),
  new THREE.LineBasicMaterial({ color: 0x30363d })
);
scene.add(boxEdges);

// ── Rod InstancedMesh ──────────────────────────────────────────────────────
// Unit cylinder: radius=1, height=1, aligned along Y.
const rodGeom = new THREE.CylinderGeometry(1, 1, 1, 10, 1);
const rodMat  = new THREE.MeshPhongMaterial({ shininess: 70 });
let   rodMesh = null;

function buildRodMesh(N) {
  if (rodMesh) { scene.remove(rodMesh); rodMesh.geometry.dispose(); rodMesh.material.dispose(); }
  rodMesh = new THREE.InstancedMesh(rodGeom, rodMat, N);
  rodMesh.frustumCulled = false;
  scene.add(rodMesh);

  // Assign fixed per-rod colors (golden-angle HSL for visual variety)
  const goldenAngle = 0.618033988749895;
  for (let i = 0; i < N; i++) {
    const hue = (i * goldenAngle) % 1.0;
    rodMesh.setColorAt(i, new THREE.Color().setHSL(hue, 0.75, 0.55));
  }
  rodMesh.instanceColor.needsUpdate = true;
}

// ── Temporaries ───────────────────────────────────────────────────────────
const _p1   = new THREE.Vector3();
const _p2   = new THREE.Vector3();
const _dir  = new THREE.Vector3();
const _mid  = new THREE.Vector3();
const _q    = new THREE.Quaternion();
const _s    = new THREE.Vector3();
const _mat  = new THREE.Matrix4();
const _yUp  = new THREE.Vector3(0, 1, 0);

function updateMesh(frameIdx) {
  if (!rodMesh || !state.buf) return;
  const N      = state.manifest.N;
  const base   = frameIdx * N * 6;
  const radius = state.frameRadius[frameIdx];
  const buf    = state.buf;

  for (let i = 0; i < N; i++) {
    const o = base + i * 6;
    _p1.set(buf[o],   buf[o+1], buf[o+2]);
    _p2.set(buf[o+3], buf[o+4], buf[o+5]);

    _dir.subVectors(_p2, _p1);
    const len = _dir.length();
    if (len < 1e-9) { _mat.identity(); }
    else {
      _dir.multiplyScalar(1 / len);
      _mid.addVectors(_p1, _p2).multiplyScalar(0.5);
      // Handle antiparallel edge case (dir ≈ -Y)
      if (_dir.y < -0.9999) {
        _q.set(1, 0, 0, 0);  // 180° around X
      } else {
        _q.setFromUnitVectors(_yUp, _dir);
      }
      _s.set(radius, len, radius);
      _mat.compose(_mid, _q, _s);
    }
    rodMesh.setMatrixAt(i, _mat);
  }
  rodMesh.instanceMatrix.needsUpdate = true;
}

// ── State ─────────────────────────────────────────────────────────────────
const state = {
  manifest:    null,
  buf:         null,   // Float32Array, shape [total_frames * N * 6]
  frameRadius: null,   // Float32Array [total_frames]
  frameStep:   null,   // Int32Array   [total_frames]  — which step index
  stepStart:   null,   // Int32Array   [num_steps]     — global frame offset

  currentFrame: 0,
  totalFrames:  0,
  playing:      true,
  fps:          30,
  lastTick:     0,
};

// ── UI helpers ────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function showStatus(msg) {
  const el = $('status');
  el.textContent = msg;
  el.classList.toggle('hidden', !msg);
}

function buildStepBar(manifest) {
  const bar    = $('step-bar');
  const labels = $('step-labels');
  bar.innerHTML = '';
  labels.innerHTML = '';

  const STEP_COLORS = ['#ff7b72','#ffa657','#d2a8ff','#79c0ff','#56d364','#e3b341','#f78166','#a5d6ff'];
  manifest.steps.forEach((step, i) => {
    const pct = (step.frames / manifest.total_frames * 100).toFixed(2) + '%';
    const col = STEP_COLORS[i % STEP_COLORS.length];

    const seg = document.createElement('div');
    seg.className = 'step-seg';
    seg.id = `seg-${i}`;
    seg.style.width = pct;
    seg.style.background = col;
    bar.appendChild(seg);

    const lbl = document.createElement('div');
    lbl.className = 'step-label';
    lbl.id = `slbl-${i}`;
    lbl.style.width = pct;
    lbl.style.color  = col;
    lbl.textContent  = step.label || `AR${step.AR}`;
    labels.appendChild(lbl);
  });
}

function updateUI() {
  const m      = state.manifest;
  if (!m) return;
  const f      = state.currentFrame;
  const si     = state.frameStep[f];
  const step   = m.steps[si];
  const inStep = f - state.stepStart[si];

  $('iv-n').textContent     = m.N;
  $('iv-ar').textContent    = step.label || `AR ${step.AR}`;
  $('iv-r').textContent     = step.radius.toExponential(2);
  $('iv-step').textContent  = `${si + 1} / ${m.steps.length}`;
  $('iv-frame').textContent = `${inStep + 1} / ${step.frames}`;

  $('scrubber').value = f;

  // Highlight active step segment
  m.steps.forEach((_, i) => {
    $(`seg-${i}`)?.classList.toggle('active', i === si);
    $(`slbl-${i}`)?.style.setProperty('opacity', i === si ? '1' : '0.45');
  });
}

function goToStep(si) {
  if (!state.manifest) return;
  si = Math.max(0, Math.min(si, state.manifest.steps.length - 1));
  state.currentFrame = state.stepStart[si];
  updateMesh(state.currentFrame);
  updateUI();
}

// ── Load data ─────────────────────────────────────────────────────────────
function b64ToFloat32(b64) {
  const binary = atob(b64);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Float32Array(bytes.buffer);
}

async function loadData() {
  let manifest, buf;

  if (window.EMBEDDED_DATA) {
    // Standalone mode — data baked into this HTML file
    showStatus('Decoding embedded data…');
    manifest = window.EMBEDDED_DATA.manifest;
    buf      = b64ToFloat32(window.EMBEDDED_DATA.trajectory);
  } else {
    // Server mode — fetch sibling files
    showStatus('Loading manifest…');
    manifest = await fetch('manifest.json').then(r => {
      if (!r.ok) throw new Error(`manifest.json: ${r.status} ${r.statusText}`);
      return r.json();
    });
    showStatus('Loading trajectory…');
    const ab = await fetch('trajectory.bin').then(r => {
      if (!r.ok) throw new Error(`trajectory.bin: ${r.status} ${r.statusText}`);
      return r.arrayBuffer();
    });
    buf = new Float32Array(ab);
  }

  state.manifest = manifest;
  state.buf      = buf;

  // Pre-compute per-frame lookup tables
  const T = manifest.total_frames;
  state.frameRadius = new Float32Array(T);
  state.frameStep   = new Int32Array(T);
  state.stepStart   = new Int32Array(manifest.steps.length);

  let offset = 0;
  manifest.steps.forEach((step, si) => {
    state.stepStart[si] = offset;
    for (let f = 0; f < step.frames; f++) {
      state.frameRadius[offset] = step.radius;
      state.frameStep[offset]   = si;
      offset++;
    }
  });
  state.totalFrames = T;

  $('scrubber').max = T - 1;
  buildStepBar(manifest);
  buildRodMesh(manifest.N);

  showStatus('');
  updateMesh(0);
  updateUI();

  requestAnimationFrame(animate);
}

// ── Animation loop ────────────────────────────────────────────────────────
function animate(now) {
  requestAnimationFrame(animate);
  controls.update();

  if (state.playing && state.buf) {
    if (now - state.lastTick > 1000 / state.fps) {
      state.currentFrame = (state.currentFrame + 1) % state.totalFrames;
      updateMesh(state.currentFrame);
      updateUI();
      state.lastTick = now;
    }
  }

  renderer.render(scene, camera);
}

// ── Event listeners ───────────────────────────────────────────────────────
$('btn-play').addEventListener('click', () => {
  state.playing = !state.playing;
  $('btn-play').textContent = state.playing ? '⏸' : '▶';
  controls.autoRotate = !state.playing;
});

$('btn-prev').addEventListener('click', () => {
  const si = state.manifest ? state.frameStep[state.currentFrame] : 0;
  goToStep(si - 1);
});

$('btn-next').addEventListener('click', () => {
  const si = state.manifest ? state.frameStep[state.currentFrame] : 0;
  goToStep(si + 1);
});

$('scrubber').addEventListener('input', e => {
  state.currentFrame = parseInt(e.target.value);
  updateMesh(state.currentFrame);
  updateUI();
});

$('speed').addEventListener('input', e => {
  state.fps = parseInt(e.target.value);
  $('speed-label').textContent = `${state.fps} fps`;
});

window.addEventListener('keydown', e => {
  if (e.key === ' ') {
    e.preventDefault();
    $('btn-play').click();
  } else if (e.key === 'ArrowRight') {
    const si = state.manifest ? state.frameStep[state.currentFrame] : 0;
    goToStep(si + 1);
  } else if (e.key === 'ArrowLeft') {
    const si = state.manifest ? state.frameStep[state.currentFrame] : 0;
    goToStep(si - 1);
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Start ─────────────────────────────────────────────────────────────────
loadData().catch(err => {
  const isFile = location.protocol === 'file:';
  const msg = isFile
    ? 'Cannot load files via file://. Run a local server:\n\n  python -m http.server 8080\n\nThen open http://localhost:8080'
    : 'Failed to load data: ' + err.message + '\n\nMake sure trajectory.bin and manifest.json are in the same directory as this HTML file.';
  $('status').style.whiteSpace = 'pre';
  $('status').style.maxWidth = '480px';
  showStatus(msg);
  console.error(err);
});
</script>
</body>
</html>
